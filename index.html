<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>PuZero | Platform Alat AI Serbaguna</title>
  <meta name="description" content="PuZero - Platform alat serbaguna bertenaga AI. Download video dari berbagai platform, konversi unit, dan tingkatkan produktivitas Anda." />
  <meta name="keywords" content="AI Downloader, Video Downloader, Productivity Tools, PuZero, Puru Zero, Web Tools" />
  <meta name="author" content="Puru Zero" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://puzero.vercel.app/" />
  <meta property="og:title" content="PuZero | Platform Alat AI Serbaguna" />
  <meta property="og:image" content="/favicon.jpg" />
  <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#6366f1', secondary: '#0f172a', accent: '#f43f5e' },
          animation: {
            'blob': 'blob 7s infinite',
            'spin-slow': 'spin 3s linear infinite',
            'loading-bar': 'loading-bar 1.5s infinite linear',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            'loading-bar': {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' }
            }
          }
        }
      }
    }
  </script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Video.js -->
  <link href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>
  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --primary-glow: radial-gradient(rgba(99,102,241,0.15), rgba(99,102,241,0)); }
    body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .btn-hover-effect { position: relative; overflow: hidden; }
    .btn-hover-effect::after { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; background: rgba(255,255,255,0.2); border-radius: 50%; transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
    .btn-hover-effect:active::after { width: 300%; height: 300%; }
    .video-js .vjs-big-play-button { top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; }
    .prose pre { background-color: #0f172a !important; color: #f8fafc !important; border-radius: 0.75rem !important; padding: 1rem !important; overflow-x: auto; }
    .prose code { color: #db2777; background-color: #f1f5f9; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-size: 0.85em; }
    .prose pre code { color: inherit; background-color: transparent; padding: 0; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    /* Dark mode init */
    html.dark body { background-color: #020617; color: #f1f5f9; }
  </style>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
